<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario
    </title>
    <link rel="stylesheet" href="formulario.css">
</head>
<body>

    <div id="area">

            <h1>Formulário</h1>
        <form>
                <label for="idtext">Nome Completo</label>
            <br><input type="text" id="idtext" name="nome"><br>

            
            <div>
                <label for="email">Email</label>
              <br><input type="email" id="email" name="idemail"><br>
            </div>

            <div>
                <label for="telefone">Número de telefone</label>
               <br> <input type="tel" id="telefone" name="telefone"><br>
            
            <div>
                <label for="data_nascimento">Data de Nascimento</label>
               <br> <input type="date" id="iddata" name="data_nascimento"><br><br>
            </div>


            
            <label for="curso">Curso</label>
          <br>  <input type="text" id="curso" name="curso"><br>

            <div>
            <label for="matricula">Matrícula</label>
        <br>    <input type="text" id="matricula" name="matricula"><br>
           </div>

           <br>
            <div>
                <button  type="submit" name="cadastrar" id="botaocadastrar" value="cadastrar" onclick="alert('Seu cadastro foi realizado com sucesso')">Enviar</button>
            </div>
            
        </form>

    </div>
    
</body>
</html>
